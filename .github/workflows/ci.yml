name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  git-policy:
    name: Git policy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate branch name
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        shell: bash
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            branch="$HEAD_REF"
          else
            branch="${GITHUB_REF_NAME}"
          fi
          node scripts/git-policy.mjs branch "$branch"

      - name: Validate PR title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: node scripts/git-policy.mjs subject "$PR_TITLE"

      - name: Validate commit subjects
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="$(git merge-base "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"
            head="${{ github.event.pull_request.head.sha }}"
          else
            head="${{ github.sha }}"
            before="${{ github.event.before }}"
            if [ -z "$before" ] || [[ "$before" =~ ^0+$ ]]; then
              before="0"
            fi
            node scripts/git-policy.mjs commit-range-for-push "$before" "$GITHUB_REF_NAME" "$DEFAULT_BRANCH" "$head"
            exit 0
          fi
          node scripts/git-policy.mjs commit-range "$base" "$head"

  version-policy:
    name: Version policy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || ((github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require version bump for publishable changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            diff_base="$(git merge-base "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"
            version_base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual publish run; version policy already passed when the commit landed on main."
            exit 0
          else
            diff_base="${{ github.event.before }}"
            version_base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [ -z "$diff_base" ] || [[ "$diff_base" =~ ^0+$ ]]; then
              diff_base="$(git rev-list --max-parents=0 "$head")"
              version_base="$diff_base"
            fi
          fi

          changed="$(git diff --name-only "$diff_base" "$head")"
          if [ -z "$changed" ]; then
            echo "No changed files detected."
            exit 0
          fi

          docs_only=false
          docs_only_pattern='(^docs/|^examples/|^README\.md$|^CONTRIBUTING\.md$|^SECURITY\.md$|^LICENSE$)'
          if ! echo "$changed" | grep -Ev "$docs_only_pattern" >/dev/null; then
            docs_only=true
          fi
          if [ "$docs_only" = "true" ]; then
            echo "Docs-only change; package version bump is not required."
            exit 0
          fi

          if ! echo "$changed" | grep -Fx 'package.json' >/dev/null; then
            echo "Publishable changes must bump package.json."
            exit 1
          fi
          if ! echo "$changed" | grep -Fx 'CHANGELOG.md' >/dev/null; then
            echo "Publishable changes must update CHANGELOG.md."
            exit 1
          fi

          current_version="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json','utf8')).version")"
          base_version="$(git show "$version_base:package.json" | node -e "let input=''; process.stdin.on('data', d => input += d); process.stdin.on('end', () => console.log(JSON.parse(input).version));")"
          node -e '
            const [baseVersion, currentVersion] = process.argv.slice(1);
            const parse = (value) => {
              const parts = value.split(".").map((part) => Number(part));
              if (parts.length !== 3 || parts.some((part) => !Number.isInteger(part) || part < 0)) {
                console.error(`Expected x.y.z package versions, got ${baseVersion} -> ${currentVersion}`);
                process.exit(1);
              }
              return parts;
            };
            const [ba, bb, bc] = parse(baseVersion);
            const [ca, cb, cc] = parse(currentVersion);
            const nextPatch = ca === ba && cb === bb && cc === bc + 1;
            const nextMinor = ca === ba && cb === bb + 1 && cc === 0;
            const nextMajor = ca === ba + 1 && cb === 0 && cc === 0;
            if (!nextPatch && !nextMinor && !nextMajor) {
              console.error(`Publishable changes must use the next sequential SemVer version after ${baseVersion}: ${ba}.${bb}.${bc + 1}, ${ba}.${bb + 1}.0, or ${ba + 1}.0.0. Got ${currentVersion}.`);
              process.exit(1);
            }
            console.log(`Package version advanced sequentially: ${baseVersion} -> ${currentVersion}`);
          ' "$base_version" "$current_version"

  check:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - 20
          - 22
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Install
        run: npm install

      - name: Check
        run: npm run check

      - name: Package dry run
        run: npm pack --dry-run

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs:
      - git-policy
      - check
      - version-policy
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Read package version
        id: package
        run: |
          version="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json','utf8')).version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Classify release change
        id: scope
        shell: bash
        run: |
          docs_only=false
          docs_only_pattern='(^docs/|^examples/|^README\.md$|^CONTRIBUTING\.md$|^SECURITY\.md$|^LICENSE$)'
          if [ "${{ github.event_name }}" = "push" ]; then
            before="${{ github.event.before }}"
            after="${{ github.sha }}"
            if [ -z "$before" ] || [[ "$before" =~ ^0+$ ]]; then
              before="$(git rev-list --max-parents=0 "$after")"
            fi
            changed="$(git diff --name-only "$before" "$after")"
            if [ -z "$changed" ]; then
              docs_only=true
            elif ! echo "$changed" | grep -Ev "$docs_only_pattern" >/dev/null; then
              docs_only=true
            fi
          fi
          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"

      - name: Check published version
        id: published
        run: |
          published="$(npm view "oh-my-wiki@${{ steps.package.outputs.version }}" version 2>/dev/null || true)"
          if [ "$published" = "${{ steps.package.outputs.version }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.published.outputs.exists == 'false'
        run: npm publish --access public

      - name: Skip existing package version for docs-only change
        if: steps.published.outputs.exists == 'true' && steps.scope.outputs.docs_only == 'true'
        run: echo "oh-my-wiki@${{ steps.package.outputs.version }} is already published; skipping npm publish."

      - name: Require version bump for publishable changes
        if: steps.published.outputs.exists == 'true' && steps.scope.outputs.docs_only != 'true'
        run: |
          echo "oh-my-wiki@${{ steps.package.outputs.version }} is already published."
          echo "Bump package.json and CHANGELOG.md before merging publishable changes to main."
          exit 1
